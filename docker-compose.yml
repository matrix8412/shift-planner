services:
  proxy:
    image: caddy:2.9
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_started

  init-db:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: ${NODE_ENV:-production}
        APP_URL: ${APP_URL}
        DATABASE_URL: ${DATABASE_URL}
        AUTH_SECRET: ${AUTH_SECRET}
        AI_PROVIDER: ${AI_PROVIDER:-openai}
        OPENAI_API_KEY: ${OPENAI_API_KEY:-}
        ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
        GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
        SMTP_HOST: ${SMTP_HOST:-}
        SMTP_PORT: ${SMTP_PORT:-}
        SMTP_USER: ${SMTP_USER:-}
        SMTP_PASSWORD: ${SMTP_PASSWORD:-}
        S3_ENDPOINT: ${S3_ENDPOINT:-}
        S3_REGION: ${S3_REGION:-}
        S3_BUCKET: ${S3_BUCKET:-}
        S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
        S3_SECRET_KEY: ${S3_SECRET_KEY:-}
        S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-}
    command: /bin/sh -c "npm run prisma:push && npm run permissions:sync"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  init-storage:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    entrypoint: >-
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do
        sleep 1;
      done;
      mc mb --ignore-existing local/$$S3_BUCKET;
      mc anonymous set private local/$$S3_BUCKET || true;
      "
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-pohotovosti}
    depends_on:
      - minio
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: ${NODE_ENV:-production}
        APP_URL: ${APP_URL}
        DATABASE_URL: ${DATABASE_URL}
        AUTH_SECRET: ${AUTH_SECRET}
        AI_PROVIDER: ${AI_PROVIDER:-openai}
        OPENAI_API_KEY: ${OPENAI_API_KEY:-}
        ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
        GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
        SMTP_HOST: ${SMTP_HOST:-}
        SMTP_PORT: ${SMTP_PORT:-}
        SMTP_USER: ${SMTP_USER:-}
        SMTP_PASSWORD: ${SMTP_PASSWORD:-}
        S3_ENDPOINT: ${S3_ENDPOINT:-}
        S3_REGION: ${S3_REGION:-}
        S3_BUCKET: ${S3_BUCKET:-}
        S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
        S3_SECRET_KEY: ${S3_SECRET_KEY:-}
        S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-}
    env_file:
      - .env
    depends_on:
      init-db:
        condition: service_completed_successfully
      init-storage:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: ${NODE_ENV:-production}
        APP_URL: ${APP_URL}
        DATABASE_URL: ${DATABASE_URL}
        AUTH_SECRET: ${AUTH_SECRET}
        AI_PROVIDER: ${AI_PROVIDER:-openai}
        OPENAI_API_KEY: ${OPENAI_API_KEY:-}
        ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
        GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
        SMTP_HOST: ${SMTP_HOST:-}
        SMTP_PORT: ${SMTP_PORT:-}
        SMTP_USER: ${SMTP_USER:-}
        SMTP_PASSWORD: ${SMTP_PASSWORD:-}
        S3_ENDPOINT: ${S3_ENDPOINT:-}
        S3_REGION: ${S3_REGION:-}
        S3_BUCKET: ${S3_BUCKET:-}
        S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
        S3_SECRET_KEY: ${S3_SECRET_KEY:-}
        S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-}
    command: npm run worker
    env_file:
      - .env
    depends_on:
      init-db:
        condition: service_completed_successfully
      init-storage:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: pohotovosti
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pohotovosti"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  minio_data:
